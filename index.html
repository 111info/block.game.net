<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast - Admin Edition</title>
    <style>
        :root { --primary: #4a90e2; --bg: #121212; --panel: #2c2c2c; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        /* ゲーム画面 */
        #game-container { position: relative; margin-top: 20px; }
        #grid { display: grid; grid-template-columns: repeat(8, 40px); grid-template-rows: repeat(8, 40px); gap: 2px; background: #333; padding: 5px; border-radius: 4px; }
        .cell { width: 40px; height: 40px; background: #444; border-radius: 2px; }
        .cell.filled { background: var(--primary); }
        
        #score-display { font-size: 24px; margin: 10px; color: #ffeb3b; }

        /* PIN入力ボタン */
        #pin-trigger { margin-top: 20px; padding: 10px 20px; background: #444; border: none; color: #ccc; border-radius: 20px; cursor: pointer; }

        /* テンキーモーダル */
        #keypad-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .keypad { display: grid; grid-template-columns: repeat(3, 70px); gap: 10px; }
        .key { width: 70px; height: 70px; background: #333; border: 1px solid #555; color: white; font-size: 20px; border-radius: 50%; cursor: pointer; }
        .key:active { background: #555; }
        #pin-display { font-size: 30px; margin-bottom: 20px; letter-spacing: 5px; height: 40px; }

        /* 管理者フルパネル */
        #admin-panel { display: none; position: fixed; inset: 0; background: var(--panel); z-index: 200; overflow-y: auto; padding: 20px; }
        .section { background: #3d3d3d; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; background: #222; color: white; border: 1px solid #555; }
        button.action-btn { width: 100%; padding: 10px; margin: 5px 0; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .danger { background: #e74c3c; color: white; }
        .safe { background: #2ecc71; color: white; }

        /* 最小化チートパネル */
        #mini-cheat-panel { display: none; position: fixed; top: 10px; right: 10px; width: 160px; background: rgba(44, 44, 44, 0.9); border: 2px solid var(--primary); border-radius: 8px; z-index: 300; padding: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #mini-cheat-panel h4 { margin: 0 0 10px 0; font-size: 12px; display: flex; justify-content: space-between; }
        .mini-btn { width: 100%; font-size: 11px; margin-bottom: 4px; padding: 5px; cursor: pointer; background: #444; color: white; border: 1px solid #666; }
    </style>
</head>
<body>

    <div id="score-display">SCORE: <span id="score">0</span></div>
    
    <div id="game-container">
        <div id="grid"></div>
    </div>

    <button id="pin-trigger" onclick="toggleKeypad(true)">PINコード入力</button>

    <div id="keypad-modal">
        <div id="pin-display"></div>
        <div class="keypad">
            <button class="key" onclick="pressKey('1')">1</button>
            <button class="key" onclick="pressKey('2')">2</button>
            <button class="key" onclick="pressKey('3')">3</button>
            <button class="key" onclick="pressKey('4')">4</button>
            <button class="key" onclick="pressKey('5')">5</button>
            <button class="key" onclick="pressKey('6')">6</button>
            <button class="key" onclick="pressKey('7')">7</button>
            <button class="key" onclick="pressKey('8')">8</button>
            <button class="key" onclick="pressKey('9')">9</button>
            <button class="key" style="background:#c0392b" onclick="pressKey('C')">C</button>
            <button class="key" onclick="pressKey('0')">0</button>
            <button class="key" style="background:#27ae60" onclick="pressKey('E')">↵</button>
        </div>
        <button onclick="toggleKeypad(false)" style="margin-top:20px; background:none; border:none; color:white;">キャンセル</button>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h2>管理者設定画面</h2>
            <button onclick="closeAdminPanel()" style="background:none; border:none; color:white; font-size:24px;">×</button>
        </div>

        <div class="section">
            <h3>チートコード作成フォーム</h3>
            <label>割り当てる数字:</label>
            <input type="number" id="new-pin" placeholder="例: 777">
            <label>効果を選択:</label>
            <select id="new-effect">
                <option value="x2">スコア2倍</option>
                <option value="x4">スコア4倍</option>
                <option value="x10">スコア10倍</option>
                <option value="init1M">スコア初期値100万</option>
            </select>
            <button class="action-btn safe" onclick="createCheatCode()">コードを保存</button>
        </div>

        <hr>
        
        <div class="section">
            <h3>管理者限定チートパネル</h3>
            <p>※以下はリアルタイム操作用です</p>
            <button class="action-btn danger" onclick="execCheat('1000x')">スコア1000倍</button>
            <button class="action-btn danger" onclick="execCheat('clear')">ブロック内即時全消し</button>
            <button class="action-btn danger" onclick="execCheat('auto')">AUTO操作 (ON/OFF)</button>
            <button class="action-btn danger" onclick="execCheat('10M')">スコア即時1000万</button>
            
            <button class="action-btn" style="background:#f39c12; color:white; margin-top:20px;" onclick="minimizePanel()">パネルを最小化</button>
        </div>
    </div>

    <div id="mini-cheat-panel">
        <h4>CHEAT MENU <span onclick="closeMiniPanel()" style="cursor:pointer;">[×]</span></h4>
        <button class="mini-btn" onclick="execCheat('1000x')">1000x</button>
        <button class="mini-btn" onclick="execCheat('clear')">全消し</button>
        <button class="mini-btn" onclick="execCheat('auto')">AUTO</button>
        <button class="mini-btn" onclick="execCheat('10M')">1000万</button>
    </div>

    <script>
        // ゲーム変数
        let score = 0;
        let multiplier = 1;
        let currentInput = "";
        let customCheats = {}; // { "コード": "効果" }

        // グリッド初期化
        const gridEl = document.getElementById('grid');
        for(let i=0; i<64; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            gridEl.appendChild(cell);
        }

        // テンキー操作
        function toggleKeypad(show) {
            document.getElementById('keypad-modal').style.display = show ? 'flex' : 'none';
            currentInput = "";
            updatePinDisplay();
        }

        function pressKey(key) {
            if(key === 'C') currentInput = "";
            else if(key === 'E') checkPin();
            else if(currentInput.length < 10) currentInput += key;
            updatePinDisplay();
        }

        function updatePinDisplay() {
            document.getElementById('pin-display').innerText = currentInput;
        }

        // PINチェック
        function checkPin() {
            if(currentInput === "admin1371") {
                openAdminPanel();
            } else if(customCheats[currentInput]) {
                applyCustomCheat(customCheats[currentInput]);
            } else {
                alert("Invalid Code");
            }
            toggleKeypad(false);
        }

        // 管理パネル制御
        function openAdminPanel() { document.getElementById('admin-panel').style.display = 'block'; }
        function closeAdminPanel() { document.getElementById('admin-panel').style.display = 'none'; }
        function minimizePanel() {
            closeAdminPanel();
            document.getElementById('mini-cheat-panel').style.display = 'block';
        }
        function closeMiniPanel() { document.getElementById('mini-cheat-panel').style.display = 'none'; }

        // チート作成
        function createCheatCode() {
            const pin = document.getElementById('new-pin').value;
            const effect = document.getElementById('new-effect').value;
            if(!pin) return alert("PINを入力してください");
            customCheats[pin] = effect;
            alert(`コード ${pin} を登録しました`);
        }

        function applyCustomCheat(type) {
            if(type === 'x2') multiplier = 2;
            if(type === 'x4') multiplier = 4;
            if(type === 'x10') multiplier = 10;
            if(type === 'init1M') { score = 1000000; updateScore(); }
            alert("チート発動: " + type);
        }

        // 管理者限定機能
        function execCheat(type) {
            if(type === '1000x') multiplier = 1000;
            if(type === '10M') { score = 10000000; updateScore(); }
            if(type === 'clear') {
                document.querySelectorAll('.cell').forEach(c => c.classList.remove('filled'));
            }
            if(type === 'auto') {
                alert("AUTOモードを切り替えました（ロジック実装待ち）");
            }
        }

        function updateScore() {
            document.getElementById('score').innerText = score.toLocaleString();
        }
    </script>
</body>
</html>
