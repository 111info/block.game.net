<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Block Blast - Rounded Edition</title>
    <style>
        :root { 
            --primary: #5465ff; 
            --bg: #0a0a0c; 
            --panel: #1c1c21; 
            --accent: #00d2ff;
            --radius: 12px; /* すべての角丸の基準 */
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        
        #score-container { font-size: 36px; font-weight: 800; margin: 25px 0; color: #fff; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* 8x8 角丸グリッド */
        #grid { 
            display: grid; 
            grid-template-columns: repeat(8, 45px); 
            grid-template-rows: repeat(8, 45px); 
            gap: 6px; 
            background: #25252b; 
            padding: 12px; 
            border-radius: 20px; /* 外枠も大きく角丸 */
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .cell { 
            width: 45px; height: 45px; 
            background: #121216; 
            border-radius: var(--radius); /* セルを角丸に */
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .cell.filled { 
            background: linear-gradient(135deg, var(--primary), var(--accent));
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            border-radius: var(--radius);
        }

        /* 持ち駒エリア */
        #piece-container { display: flex; justify-content: center; gap: 25px; margin-top: 40px; height: 130px; }
        .piece { display: grid; gap: 4px; cursor: pointer; transition: transform 0.2s ease; }
        .piece:hover { transform: scale(1.05); }
        .p-cell { width: 28px; height: 28px; border-radius: 8px; background: #5465ff; }

        /* PIN入力ボタン（角丸カプセル） */
        #pin-trigger { 
            margin-top: 30px; padding: 14px 40px; 
            background: linear-gradient(90deg, #333, #444);
            border: none; color: #eee; 
            border-radius: 50px; /* カプセル型 */
            cursor: pointer; font-weight: 600; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        /* 管理者パネル（フル） */
        #admin-panel { 
            display: none; position: fixed; inset: 0; 
            background: var(--panel); z-index: 2000; 
            padding: 40px; border-radius: 0; /* 全画面なので0 */
        }
        .section { 
            background: #2a2a32; padding: 25px; margin-bottom: 25px; 
            border-radius: 24px; /* 大きな角丸 */
            border: 1px solid #3a3a45;
        }
        input, select { 
            width: 100%; padding: 15px; margin: 12px 0; 
            background: #121216; color: white; border: none; 
            border-radius: var(--radius); font-size: 16px;
        }
        .btn { 
            width: 100%; padding: 16px; margin: 8px 0; 
            border: none; border-radius: var(--radius); 
            font-weight: 800; cursor: pointer; text-transform: uppercase;
        }
        .danger { background: #ff4757; color: white; }
        .safe { background: #2ed573; color: white; }

        /* 最小化パネル（角丸フロート） */
        #mini-panel { 
            display: none; position: fixed; top: 20px; right: 20px; 
            width: 150px; background: rgba(28, 28, 33, 0.9); 
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent); 
            border-radius: 20px; z-index: 3000; padding: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .mini-btn { 
            width: 100%; font-size: 12px; margin-bottom: 8px; 
            padding: 10px; background: #3a3a45; color: white; 
            border: none; cursor: pointer; border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="score-container"><span id="score">0</span></div>
    
    <div id="grid"></div>

    <div id="piece-container"></div>

    <button id="pin-trigger" onclick="openPinModal()">PINコード入力 / 英数字</button>

    <div id="pin-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:5000; flex-direction:column; justify-content:center; align-items:center;">
        <div style="background:var(--panel); padding:40px; border-radius:30px; text-align:center; width:300px;">
            <h3 style="margin-top:0;">ENTER ACCESS CODE</h3>
            <input type="text" id="pin-input" placeholder="Type here..." autofocus style="text-align:center;">
            <button class="btn safe" onclick="submitPin()">ENTER</button>
            <button onclick="closePinModal()" style="background:none; border:none; color:#888; cursor:pointer; margin-top:10px;">CANCEL</button>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom:30px;">
            <h1 style="margin:0; font-size:32px;">Admin Center</h1>
            <button onclick="closeAdminPanel()" style="background:#3a3a45; border:none; color:white; width:45px; height:45px; border-radius:50%; font-size:20px; cursor:pointer;">×</button>
        </div>

        <div class="section">
            <h3 style="margin-top:0;">Custom PIN Generator</h3>
            <input type="text" id="custom-pin" placeholder="Enter custom code (e.g. MEGA)">
            <select id="custom-effect">
                <option value="x2">Score x2</option>
                <option value="x10">Score x10</option>
                <option value="init1M">Start with 1,000,000</option>
            </select>
            <button class="btn safe" onclick="saveCheat()">Generate Code</button>
        </div>

        <div class="section">
            <h3>Direct Cheat Controls</h3>
            <button class="btn danger" onclick="cheatAction('1000x')">1000x MULTIPLIER</button>
            <button class="btn danger" onclick="cheatAction('clear')">CLEAR GRID NOW</button>
            <button class="btn danger" onclick="cheatAction('auto')">TOGGLE AUTO-BOT</button>
            <button class="btn danger" onclick="cheatAction('10M')">SET 10,000,000 PTS</button>
            <button class="btn" style="background:#5465ff; color:white;" onclick="minimizeAdmin()">MINIMIZE TO CORNER</button>
        </div>
    </div>

    <div id="mini-panel">
        <div style="font-size:11px; font-weight:bold; margin-bottom:10px; color:var(--accent); display:flex; justify-content:space-between;">
            MOD ACTIVE <span onclick="closeMini()" style="cursor:pointer;">×</span>
        </div>
        <button class="mini-btn" onclick="cheatAction('1000x')">1000x</button>
        <button class="mini-btn" onclick="cheatAction('clear')">Clear</button>
        <button class="mini-btn" onclick="cheatAction('auto')">Auto</button>
        <button class="mini-btn" onclick="cheatAction('10M')">10M</button>
    </div>

<script>
    /* --- Game Logic --- */
    let score = 0;
    let scoreMultiplier = 1;
    let customCheats = {};

    function init() {
        const grid = document.getElementById('grid');
        for(let i=0; i<64; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.id = `cell-${i}`;
            grid.appendChild(cell);
        }
        spawn();
        updateScore();
    }

    function spawn() {
        const container = document.getElementById('piece-container');
        container.innerHTML = '';
        for(let i=0; i<3; i++) {
            const p = document.createElement('div');
            p.className = 'piece';
            p.style.gridTemplateColumns = 'repeat(2, 28px)';
            // 2x2の角丸ブロックを生成
            for(let j=0; j<4; j++) {
                const c = document.createElement('div');
                c.className = 'p-cell';
                p.appendChild(c);
            }
            p.onclick = () => placeRandom(p);
            container.appendChild(p);
        }
    }

    function placeRandom(el) {
        // 簡易配置
        const emptyCells = Array.from(document.querySelectorAll('.cell:not(.filled)'));
        if(emptyCells.length >= 4) {
            for(let i=0; i<4; i++) emptyCells[i].classList.add('filled');
            score += 40 * scoreMultiplier;
            updateScore();
            el.style.opacity = '0';
            setTimeout(() => {
                el.remove();
                if(container.children.length === 0) spawn();
            }, 200);
        }
    }

    /* --- Admin Logic --- */
    function openPinModal() { 
        document.getElementById('pin-modal').style.display = 'flex'; 
        document.getElementById('pin-input').focus();
    }
    function closePinModal() { document.getElementById('pin-modal').style.display = 'none'; }
    
    function submitPin() {
        const pin = document.getElementById('pin-input').value;
        if(pin === 'admin1371') {
            document.getElementById('admin-panel').style.display = 'block';
        } else if(customCheats[pin]) {
            applyEffect(customCheats[pin]);
        }
        document.getElementById('pin-input').value = '';
        closePinModal();
    }

    function saveCheat() {
        const p = document.getElementById('custom-pin').value;
        const e = document.getElementById('custom-effect').value;
        if(p) { customCheats[p] = e; alert('Code Registered!'); }
    }

    function applyEffect(eff) {
        if(eff === 'x10') scoreMultiplier = 10;
        if(eff === 'init1M') { score = 1000000; updateScore(); }
        alert('Cheat Applied!');
    }

    function cheatAction(type) {
        if(type === '1000x') scoreMultiplier = 1000;
        if(type === '10M') { score = 10000000; updateScore(); }
        if(type === 'clear') { document.querySelectorAll('.cell').forEach(c => c.classList.remove('filled')); }
        if(type === 'auto') { setInterval(() => { document.querySelector('.piece')?.click(); }, 100); }
    }

    function updateScore() { document.getElementById('score').innerText = score.toLocaleString(); }
    function minimizeAdmin() { document.getElementById('admin-panel').style.display = 'none'; document.getElementById('mini-panel').style.display = 'block'; }
    function closeMini() { document.getElementById('mini-panel').style.display = 'none'; }

    init();
</script>
</body>
</html>
